volumes:
  hermes:
  home:
services:
    hermes-agent:
        build: .
        container_name: hermes
        restart: unless-stopped
        volumes:
            - home:/root
            - hermes:/opt/data
            - /var/run/docker.sock:/var/run/docker.sock
        env_file:
          - .env
        command: gateway run
        environment:
          - HERMES_DASHBOARD=1
          - TELEGRAM_ALLOWED_USERS=282184670


    hermes-dashboard:
        container_name: hermes-dashboard
        restart: unless-stopped
        # user: '10000'
        volumes:
            - hermes:/opt/data
        expose:
            - 9119
        environment:
            - GATEWAY_HEALTH_URL=http://hermes:8642
        build: .
        command: dashboard --host 0.0.0.0 --insecure 

    hermes-node:
        container_name: hermes-node
        restart: unless-stopped
        # user: '10000'
        # volumes:
        #     - hermes:/opt/data
        environment:
            - GATEWAY_HEALTH_URL=http://hermes:8642
        build: .
        command: meet node run
